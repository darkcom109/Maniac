{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maniac</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>
    <header>
        <h1>Maniac</h1>
        <nav>
            <a href="/">Feed</a> |
            <a href="/post/">Post</a> |
            <a href="/login/">Login</a> |
            <a href="/signup/">Signup</a>
        </nav>
        <hr>
    </header>

    <main>
        {% block content %}
        <!-- Child templates will inject their stuff here -->
        {% endblock %}
    </main>

    <footer>
        <hr>
        <p>&copy; 2025 Maniac, the social media app for professional roasters.</p>
    </footer>
</body>
</html>
