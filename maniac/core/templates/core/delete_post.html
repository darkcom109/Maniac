{% extends "core/base.html" %}
{% block content %}
  <h2>Delete Post</h2>
  <p>Are you sure you want to delete this post?</p>
  <blockquote>{{ post.content }}</blockquote>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'feed' %}">Cancel</a>
  </form>
{% endblock %}
